repos:
  # pre commit
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-unit
        name: pytest unit
        entry: uv run pytest tests/unit -q
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy typecheck
        entry: uv run mypy .
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # pre push
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit
        entry: uv run pytest tests/unit -q
        language: system
        pass_filenames: false
        stages: [pre-push]