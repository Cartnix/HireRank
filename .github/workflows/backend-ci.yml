name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        run: uv python install 3.13
      
      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Tests + Coverage
        run: |
          uv run pytest -v