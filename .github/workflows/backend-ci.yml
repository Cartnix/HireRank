name: Backend CI

on:
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Setup Python
        run: uv python install 3.13

      - name: Install deps
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest tests/unit -q