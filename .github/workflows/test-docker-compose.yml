name: Test Docker Compose

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PORT: 5432
      DOMAIN: localhost
      ENVIRONMENT: local

      STACK_NAME: ${{ secrets.STACK_NAME }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

      BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
      EMAILS_FROM_EMAIL: noreply@example.com

      FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
      FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}

      POSTGRES_SERVER: ${{ secrets.POSTGRES_SERVER }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}

      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_IMAGE_BACKEND }}
      DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKER_IMAGE_FRONTEND }}

      SENTRY_DSN: ""

      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: docker compose -f compose.yml -f compose.ci.yml build
      - run: docker compose down -v --remove-orphans

      # - run: docker compose -f compose.yml -f compose.ci.yml up -d backend frontend adminer

      # - name: Debug
      #   if: always()
      #   run: |
      #     docker compose -f compose.yml -f compose.ci.yml ps
      #     docker compose -f compose.yml -f compose.ci.yml logs backend --tail=200
      #     docker inspect $(docker compose -f compose.yml -f compose.ci.yml ps -q backend) \
      #       --format='{{json .State.Health}}'
      #     docker compose -f compose.yml -f compose.ci.yml exec backend \
      #     curl -v http://localhost:8000/api/v1/utils/health-check/

      - name: Wait
        run: docker compose -f compose.yml -f compose.ci.yml wait backend frontend adminer
      - name: Test backend is up
        run: curl http://localhost:8000/api/v1/utils/health-check
      - name: Test frontend is up
        run: curl http://localhost:3000
      - run: docker compose down -v --remove-orphans
