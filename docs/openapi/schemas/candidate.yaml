# schemas/candidate.yaml

CandidateStatus:
  type: string
  enum: [unassigned, assigned]
  example: unassigned

VacancyMatchScore:
  type: object
  required: [vacancy_id, vacancy_title, score]
  properties:
    vacancy_id:
      type: string
      format: uuid
    vacancy_title:
      type: string
      example: Backend Developer
    score:
      type: number
      format: float
      minimum: 0
      maximum: 10
      example: 8.7

EducationEntry:
  type: object
  description: Одна строка таблицы учебных заведений из ЛПК (п.7)
  properties:
    institution:
      type: string
      description: Название учебного заведения и его местонахождение
      example: КазНУ им. аль-Фараби, г. Алматы
    year_from:
      type: string
      description: Год поступления (строка — форма не гарантирует число)
      example: "2012"
    year_to:
      type: string
      description: Год окончания или ухода
      example: "2016"
    dropped_at_year:
      type: string
      nullable: true
      description: С какого курса ушёл (если не окончил)
      example: null
    specialty:
      type: string
      description: Специальность, по которой обучался
      example: Информационные системы
    diploma:
      type: string
      description: Квалификация и № диплома / удостоверения
      example: Диплом бакалавра № 012345

Questionnaire:
  type: object
  description: |
    Кадровая анкета кандидата — структура соответствует официальному
    «Личному листку по учёту кадров» (ЛПК, форма lpk.html).
    Поля пронумерованы в соответствии с пунктами формы.
  properties:
    # п.1 — ФИО
    surname:
      type: string
      description: "п.1 — Фамилия (name=surname в форме)"
      example: Сейткали
    first_name:
      type: string
      description: "п.1 — Имя (name=first_name)"
      example: Алибек
    patronymic:
      type: string
      description: "п.1 — Отчество (name=patronymic)"
      example: Серикович
    # п.2 — Пол
    gender:
      type: string
      description: "п.2 — Пол (free-text из формы)"
      example: мужской
    # п.3 — Дата рождения
    birth_date:
      type: string
      description: |
        п.3 — Год, число и месяц рождения.
        Принимается как string: форма free-text, нормализацию делает бэк.
      example: "1995-03-15"
    # п.4 — Место рождения
    birth_place:
      type: string
      description: "п.4 — Место рождения (село/город, район, область, республика)"
      example: г. Алматы, Алматинская обл., Казахстан
    # п.5–6
    nationality:
      type: string
      description: "п.5 — Национальность (Ұлты)"
      example: казах
    citizenship:
      type: string
      description: "п.6 — Гражданство (Азаматтығы)"
      example: Казахстан
    # п.7 — Образование
    education_level:
      type: string
      description: "п.7 — Уровень образования (free-text из формы)"
      example: высшее
    education:
      type: array
      description: "п.7 — Таблица учебных заведений (до 4 строк в форме)"
      maxItems: 4
      items:
        $ref: '#/EducationEntry'
    # п.8 — Языки
    languages:
      type: string
      description: |
        п.8 — Родной язык и другие языки, степень владения (free-text).
        Форма содержит одно поле name=languages.
      example: "казахский (родной), русский (свободно), английский (читаю и перевожу со словарём)"
    # п.9 — Учёная степень
    academic_degree:
      type: string
      description: "п.9 — Учёная степень / учёное звание"
      example: ""
    # п.10 — Научные труды
    scientific_works:
      type: array
      description: "п.10 — Научные труды и изобретения (две строки в форме)"
      maxItems: 2
      items:
        type: string
      example: ["", ""]

Candidate:
  type: object
  required: [id, enterprise_id, status, created_at]
  properties:
    id:
      type: string
      format: uuid
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    enterprise_id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
      description: Связанный User (если кандидат зарегистрировался сам)
      nullable: true
    status:
      $ref: '#/CandidateStatus'
    assigned_vacancy_id:
      type: string
      format: uuid
      nullable: true
    questionnaire:
      $ref: '#/Questionnaire'
    ai_score:
      type: number
      format: float
      minimum: 0
      maximum: 10
      nullable: true
      example: 7.4
    ai_rankings:
      type: array
      items:
        $ref: '#/VacancyMatchScore'
      description: Скоры по всем вакансиям предприятия
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateCandidateRequest:
  type: object
  description: Используется HR Operator для ручного создания карточки кандидата
  required: [questionnaire]
  properties:
    questionnaire:
      $ref: '#/Questionnaire'

UpdateQuestionnaireRequest:
  type: object
  required: [questionnaire]
  properties:
    questionnaire:
      $ref: '#/Questionnaire'

AssignCandidateRequest:
  type: object
  required: [vacancy_id]
  properties:
    vacancy_id:
      type: string
      format: uuid
      example: b2c3d4e5-f6a7-8901-bcde-f23456789012

PagedCandidateResponse:
  type: object
  required: [items, pagination]
  properties:
    items:
      type: array
      items:
        $ref: '#/Candidate'
    pagination:
      $ref: './common.yaml#/Pagination'