# schemas/auth.yaml

TokenPair:
  type: object
  required: [access_token, refresh_token, token_type]
  properties:
    access_token:
      type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    refresh_token:
      type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    token_type:
      type: string
      enum: [bearer]
      example: bearer
    expires_in:
      type: integer
      description: Время жизни access_token в секундах
      example: 3600

RegisterRequest:
  type: object
  required: [email, password, role, enterprise_id]
  properties:
    email:
      type: string
      format: email
      example: ivan@mrxcompany.kz
    password:
      type: string
      format: password
      minLength: 8
      example: Str0ngPass!
    role:
      type: string
      enum: [candidate, hr_operator, manager]
      description: Administrator создаётся вручную, не через этот endpoint
      example: hr_operator
    enterprise_id:
      type: string
      format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    first_name:
      type: string
      example: Иван
    last_name:
      type: string
      example: Петров

LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
      example: ivan@mrxcompany.kz
    password:
      type: string
      format: password
      example: Str0ngPass!

RefreshRequest:
  type: object
  required: [refresh_token]
  properties:
    refresh_token:
      type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
